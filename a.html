<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .welcome-container {
            background: white;
            padding: 60px 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 500px;
        }

        .welcome-container h1 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 32px;
        }

        .username {
            color: #764ba2;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .welcome-message {
            color: #555;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .logout-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .logout-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <h1>Welcome!</h1>
        <div class="username" id="userEmail">User</div>
        <div class="welcome-message">
            <p>You have successfully logged in. Enjoy exploring the application!</p>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <script>
        // Extract email from URL parameters
        function getEmailFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('email') || 'Guest';
        }

        // Display username on page load
        window.addEventListener('DOMContentLoaded', () => {
            const email = getEmailFromURL();
            const userEmailElement = document.getElementById('userEmail');
            userEmailElement.textContent = `Hello, ${email}!`;
        });

        // Logout function
        function logout() {
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
